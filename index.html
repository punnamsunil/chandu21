<!DOCTYPE html>
<html lang="te">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>మండప నిర్మాణ దాతలు</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

/* HEADER */

header{
background:#FF8C00;
color:white;
padding:20px;
}

.title{
font-size:26px;
font-weight:bold;
}

.temple{
font-size:20px;
margin-top:5px;
}

.sub{
margin-top:6px;
font-size:17px;
}

/* SEARCH */

.search-box{
margin-top:15px;
}

.search-box input{
padding:10px;
width:80%;
max-width:400px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

/* SOUND BUTTON */

.sound-btn{
position:fixed;
top:15px;
right:15px;
background:black;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

/* CARD LIST */

.container{
width:90%;
max-width:600px;
margin:auto;
margin-top:20px;
height:420px;
overflow-y:auto;
padding:10px;
}

.card{
background:white;
padding:18px;
margin:12px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
text-align:left;
cursor:pointer;
}

.name{
font-size:20px;
font-weight:bold;
}

.amount{
color:green;
margin-top:4px;
}

.date{
font-size:14px;
color:#666;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-card{
width:300px;
height:300px;
background:#111;
color:white;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

/* RAINBOW BORDER */

.popup-card::before{

content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
padding:3px;

border-radius:12px;

background:linear-gradient(
45deg,
red,
orange,
yellow,
lime,
cyan,
blue,
magenta,
red
);

background-size:400%;
animation:rainbow 6s linear infinite;

-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

}

.popup-card::after{

content:"";
position:absolute;
top:-6px;
left:-6px;
right:-6px;
bottom:-6px;

border-radius:14px;

background:linear-gradient(
45deg,
red,
orange,
yellow,
lime,
cyan,
blue,
magenta,
red
);

background-size:400%;

filter:blur(12px);
opacity:0.7;

animation:rainbow 6s linear infinite;

z-index:-1;

}

@keyframes rainbow{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.popup-name{
font-size:24px;
font-weight:bold;
}

.popup-amount{
margin-top:10px;
font-size:20px;
color:#00ff9c;
}

.popup-date{
margin-top:10px;
font-size:16px;
color:#ccc;
}

</style>

</head>

<body>

<button class="sound-btn" onclick="toggleSound()">🔊</button>

<header>

<div class="title">ధర్మరక్షతి రక్షితః</div>

<div class="temple">
శ్రీశ్రీ సీతారామస్వామి దేవాలయం, కొత్తగుంత
</div>

<div class="sub">
మండప నిర్మాణ దాతలు
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="searchDonor()">
</div>

</header>

<div class="container">

<div class="card" data-name="ramaiah"
onclick="openCard('రామయ్య గారు','₹10,000','12-02-2026')">
<div class="name">రామయ్య గారు</div>
<div class="amount">₹10,000</div>
<div class="date">12-02-2026</div>
</div>

<div class="card" data-name="sitamma"
onclick="openCard('సీతమ్మ గారు','₹5,000','15-02-2026')">
<div class="name">సీతమ్మ గారు</div>
<div class="amount">₹5,000</div>
<div class="date">15-02-2026</div>
</div>

<div class="card" data-name="venkatesh"
onclick="openCard('వెంకటేశ్వర్లు గారు','₹25,000','20-02-2026')">
<div class="name">వెంకటేశ్వర్లు గారు</div>
<div class="amount">₹25,000</div>
<div class="date">20-02-2026</div>
</div>

<div class="card" data-name="lakshmi"
onclick="openCard('లక్ష్మి గారు','₹3,000','21-02-2026')">
<div class="name">లక్ష్మి గారు</div>
<div class="amount">₹3,000</div>
<div class="date">21-02-2026</div>
</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup" onclick="closeCard()">

<div class="popup-card">

<div class="popup-name" id="pname"></div>

<div class="popup-amount" id="pamount"></div>

<div class="popup-date" id="pdate"></div>

</div>

</div>

<!-- AUDIO -->

<audio id="mantra" loop>
<source src="jai-sri-ram.mp3" type="audio/mpeg">
</audio>

<script>

/* PLAY AUDIO AFTER FIRST CLICK */

document.body.addEventListener("click",function(){

document.getElementById("mantra").play();

},{once:true});

/* MUTE BUTTON */

const audio=document.getElementById("mantra");

function toggleSound(){

audio.muted=!audio.muted;

}

/* SEARCH */

function searchDonor(){

let input=document.getElementById("searchInput").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let telugu=card.querySelector(".name").innerText.toLowerCase();
let english=card.getAttribute("data-name");

if(telugu.includes(input) || english.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

/* POPUP */

function openCard(name,amount,date){

document.getElementById("popup").style.display="flex";

document.getElementById("pname").innerText=name;
document.getElementById("pamount").innerText=amount;
document.getElementById("pdate").innerText=date;

}

function closeCard(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
