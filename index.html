  <!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>మండప నిర్మాణ దాతలు</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:0;
text-align:center;
}

/* HEADER */

header{
background:#FF8C00;
color:white;
padding:20px;
}

.title{
font-size:26px;
font-weight:bold;
}

.temple{
font-size:20px;
margin-top:6px;
}

.sub{
font-size:17px;
margin-top:8px;
}

/* SEARCH */

.search-box{
margin-top:15px;
}

.search-box input{
width:80%;
max-width:400px;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

/* SOUND BUTTON */

.sound-btn{
position:fixed;
top:15px;
right:15px;
background:#111;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

/* CARD LIST */

.container{
height:420px;
width:90%;
max-width:600px;
margin:auto;
margin-top:20px;
overflow-y:auto;
padding:10px;
scroll-behavior:smooth;
-webkit-overflow-scrolling:touch;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
text-align:left;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.name{
font-size:20px;
font-weight:bold;
}

.amount{
color:green;
margin-top:5px;
}

.date{
font-size:14px;
color:#666;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-card{
width:300px;
height:300px;
background:#111;
color:white;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

/* RAINBOW BORDER */

.popup-card::before{

content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
border-radius:12px;
padding:3px;

background:linear-gradient(
45deg,
red,
orange,
yellow,
lime,
cyan,
blue,
magenta,
red
);

background-size:400%;
animation:rainbowMove 6s linear infinite;

-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

}

.popup-card::after{

content:"";
position:absolute;
top:-6px;
left:-6px;
right:-6px;
bottom:-6px;

border-radius:14px;

background:linear-gradient(
45deg,
red,
orange,
yellow,
lime,
cyan,
blue,
magenta,
red
);

background-size:400%;

filter:blur(12px);
opacity:0.7;

animation:rainbowMove 6s linear infinite;

z-index:-1;

}

@keyframes rainbowMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.popup-name{
font-size:24px;
font-weight:bold;
}

.popup-amount{
margin-top:10px;
font-size:20px;
color:#00ff9c;
}

.popup-date{
margin-top:10px;
font-size:16px;
color:#ccc;
}

</style>
</head>

<body>

<button class="sound-btn" onclick="toggleSound()">🔊 Mute</button>

<header>

<div class="title">
ధర్మరక్షతి రక్షితః
</div>

<div class="temple">
శ్రీశ్రీ సీతారామస్వామి దేవాలయం, కొత్తగుంత
</div>

<div class="sub">
మండప నిర్మాణ దాతలు
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="searchDonor()">
</div>

</header>

<div class="container" id="donorList">

<div class="card" data-name="ramaiah" onclick="openCard('రామయ్య గారు','₹10,000','12-02-2026')">
<div class="name">రామయ్య గారు</div>
<div class="amount">₹10,000</div>
<div class="date">12-02-2026</div>
</div>

<div class="card" data-name="sitamma" onclick="openCard('సీతమ్మ గారు','₹5,000','15-02-2026')">
<div class="name">సీతమ్మ గారు</div>
<div class="amount">₹5,000</div>
<div class="date">15-02-2026</div>
</div>

<div class="card" data-name="venkateshwarulu" onclick="openCard('వెంకటేశ్వర్లు గారు','₹25,000','20-02-2026')">
<div class="name">వెంకటేశ్వర్లు గారు</div>
<div class="amount">₹25,000</div>
<div class="date">20-02-2026</div>
</div>

<div class="card" data-name="lakshmi" onclick="openCard('లక్ష్మి గారు','₹3,000','21-02-2026')">
<div class="name">లక్ష్మి గారు</div>
<div class="amount">₹3,000</div>
<div class="date">21-02-2026</div>
</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup" onclick="closeCard()">

<div class="popup-card">

<div class="popup-name" id="pname"></div>
<div class="popup-amount" id="pamount"></div>
<div class="popup-date" id="pdate"></div>

</div>

</div>

<!-- AUDIO -->

<audio id="mantra" loop autoplay>
<source src="jai-sri-ram.mp3" type="audio/mpeg">
</audio>

<script>

const audio=document.getElementById("mantra");
const btn=document.querySelector(".sound-btn");

function toggleSound(){

if(audio.muted){
audio.muted=false;
btn.innerText="🔊 Mute";
}else{
audio.muted=true;
btn.innerText="🔇 Unmute";
}

}

/* SEARCH FUNCTION */

function searchDonor(){

let input=document.getElementById("searchInput").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let teluguName=card.querySelector(".name").innerText.toLowerCase();
let englishName=card.getAttribute("data-name");

if(teluguName.includes(input) || englishName.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

/* POPUP */

function openCard(name,amount,date){

document.getElementById("popup").style.display="flex";

document.getElementById("pname").innerText=name;
document.getElementById("pamount").innerText=amount;
document.getElementById("pdate").innerText=date;

}

function closeCard(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
